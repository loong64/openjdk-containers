configurations:
  linux:
  # Debian Trixie (loong64)
  - directory: debian/trixie
    image: ghcr.io/loong64/debian:trixie
    architectures: [loong64]
    os: debian

  # Anolis OS 23 (loong64, RHEL-compatible)
  - directory: anolis/23
    image: ghcr.io/loong64/anolis:23
    architectures: [loong64]
    os: anolis
